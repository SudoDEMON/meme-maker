<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TRAXUS // Blackbird Terminal</title>

<style>
/* ---------- layout ---------- */
html,body{height:100%;margin:0}
body{
  display:flex;align-items:center;justify-content:center;
  background:#000;font-family:"IBM Plex Mono",monospace;
  color:#e6e6e6;overflow:hidden;
}

/* ---------- terminal panel ---------- */
#terminal{
  position:relative;background:#111;border-radius:10px;
  box-shadow:0 0 25px rgba(0,0,0,.9);
  padding:26px;max-width:960px;width:90%;
  line-height:1.35;font-size:14px;
  white-space:pre-wrap;overflow:hidden;
  transform:perspective(900px) rotateX(4deg);
  transition:background-color 2s;
}
#terminal.orange{background:#b7421c}
#terminal.fading{animation:bgFade 2s forwards;}
@keyframes bgFade{to{background-color:transparent;}}

/* scan‑lines */
#terminal::after{
  content:"";position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,
     rgba(255,255,255,.04)0 1px,rgba(0,0,0,0)1px 2px);
  mix-blend-mode:screen;pointer-events:none;
  opacity:.7;transition:opacity .6s;
}
@keyframes flicker{0%,100%{opacity:.98}50%{opacity:.94}}
#terminal{animation:flicker 3s infinite steps(60);}

/* radiation flash */
#radiation{
  position:absolute;inset:0;z-index:1;
  background:radial-gradient(circle,
    rgba(255,255,255,.25)0%,rgba(255,255,255,0)60%);
  opacity:0;transition:opacity 3s ease-out;
}

/* typing cursor */
.cursor{
  display:inline-block;width:10px;background:#e6e6e6;margin-left:2px;
  animation:blink 1s steps(1) infinite;z-index:2;
}
@keyframes blink{50%{opacity:0}}

/* ---------- video (inside, under text) ---------- */
#easterEgg{
  position:absolute;inset:0;z-index:0;
  width:100%;height:100%;object-fit:cover;
  opacity:0;transition:opacity 1s;
  border-radius:10px;           /* clip inside panel */
}
</style>
</head>
<body>

<div id="terminal">
  <div id="radiation"></div>

  <!-- local clip sits *inside* panel -->
  <video id="easterEgg"
         src="marathon-marathon-game.mp4" preload="auto"
         muted autoplay loop playsinline></video>
</div>

<script>
/* ---------- intro & report lines (unchanged) ---------- */
const INTRO_LINES = [
  'Initiating Secure Comms: TRX-SEC',
  'Establishing encrypted channel ░░░░░',
  'Channel secure.',
  'Validating AUTH_SIG: nX*3kW>rAEFxm2%',
  '◢◤ [ AUTH_SIG: nX*3kW>rAEFxm2% ] ◢◤',
  '◢◤ [ ✔ Retrieval validated  |  TRX‑SEC SENTINEL SIGMA‑7 ] ◢◤',
  'Handshake complete.'
];

const REPORT_LINES = [
  ' █████████████████████████████████████ ',
  ' █████████████████████████████████████ ',
  '             ▄███████████▄             ',
  '           ▄████▀█████▀████▄           ',
  '         ▄████▀  █████  ▀████▄         ',
  ' ▄▄▄▄▄▄▄████▀    █████    ▀████▄▄▄▄▄▄  ',
  ' █████████▀      █████     ▀█████████  ',
  '                TRAXUS                ',
  '            WE BUILD WORLDSᴰ           ',
  '',
  '// ::TRAXUS SIGNAL OBSERVATORY NODE UX‑4409',
  '// ::PAYLOAD SEGMENT GAMMA‑77  —  FINALIZED',
  '// ::DECODING LATTICE BACKFLOW  <SYNC 97%>',
  '',
  '+HX8‑9ΔΞ::STYX‑T7‑HOLO→UE11::SA◆LMN‑Ω00••',
  '+99ZT‑B80==ADMP2!Z##11CCZ‑MN2##PL••',
  '+--PXE‑R0X//00211#TX1J‑9SXC=!!ENG██',
  '++ΛΞΣ/STACK::ORPHEUS_CORE||0x7A42B1||',
  '+==TRX//SIG‑SCAN//BNDRY::CORRUPTION_LEVEL:███████░░░░ 46%',
  '+--TRX‑AI ▸ PARSE_MODE = <UUE>  ▸ CRC STABLE',
  '',
  '// ::FIELD REPORT    >> AGENT VOID//.YETI',
  '// ::OPERATION ID    >> “ORPHEUS‑1138 / BLACKBIRD”',
  '// ::EXFIL VECTOR    >> REVENANT‑CLASS DROP (PHANTOM Δ‑BLACK)',
  '// ::MISSION STATUS  >>  ✓  OBJECTIVE SECURED',
  '',
  '>  ACTION SUMMARY',
  '   ▸ Pfhor Annex‑Θ breached via Vent AX‑17 (silent).',
  '   ▸ Physical Pod ORPHEUS_CORE extracted intact.',
  '   ▸ BLACKBIRD_CORE online — initial pulse 8.2 THz.',
  '   ▸ Drone lattice suppressed — zero outbound alarms.',
  '',
  '>  CAPITAL IMPACT (PROJ)',
  '   ▸ Ω‑tier proto‑AI valuation : ████ 13.8 B Cr',
  '   ▸ Trade surplus (Δ 24 mos)  : █████████ 227 %',
  '',
  '// ::FORWARD TO  >> TRX‑SEC — “HELIOS FRAME”',
  '// ::AUTH LEVEL  >> 5‑C (Pre‑cleared)',
  '// ::ETA        >> 03:14:22 and falling…',
  '',
  '◢◤ [ AUTH_SIG: nX*3kW>rAEFxm2% ] ◢◤',
  '◢◤ [ ✔ Retrieval validated  |  TRX‑SEC SENTINEL SIGMA‑7 ] ◢◤'
];

/* ---------- setup ---------- */
const term=document.getElementById('terminal');
const rad =document.getElementById('radiation');
const vid =document.getElementById('easterEgg');

const cur=document.createElement('span');
cur.className='cursor';cur.textContent=' ';term.appendChild(cur);

/* ---------- typewriter ---------- */
let phase='intro', lines=INTRO_LINES, lineIdx=0, charIdx=0;
const SPEED={intro:25, report:8};
const STRIDE={intro:1, report:1};

function next(){
  const speed=SPEED[phase], stride=STRIDE[phase];

  if(lineIdx>=lines.length){
    if(phase==='intro'){
      setTimeout(()=>{
        phase='report';lines=REPORT_LINES;
        term.classList.add('orange');
        term.innerHTML='';term.appendChild(cur);
        lineIdx=charIdx=0;next();
      },3000);
    }else{
      /* report finished */
      cur.remove();
      rad.style.opacity='1';
      setTimeout(()=>rad.style.opacity='0',1800);

      term.classList.add('fading');    // bg → transparent
      vid.style.opacity='1';           // fade video in
      vid.play();                      // ensure playback
    }
    return;
  }

  if(charIdx===0){
    const div=document.createElement('div');
    term.insertBefore(div,cur);
  }

  const line=lines[lineIdx];
  for(let i=0;i<stride && charIdx<line.length;i++){
    term.children[lineIdx].textContent+=line.charAt(charIdx++);
  }
  if(charIdx>=line.length){charIdx=0;lineIdx++;}
  setTimeout(next,speed);
}
next();
</script>
</body>
</html>
