<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TRAXUS // Blackbird Terminal</title>
<style>
  html,body{height:100%;margin:0;padding:0}
  /* WAS: body{ background:#000; … } */
body{
  display:flex;
  align-items:center;
  justify-content:center;
  background:transparent;   /* transparent instead of black */
  font-family:"IBM Plex Mono",monospace;
  color:#e6e6e6;
  overflow:hidden;
}
  #terminal{
    position:relative;
    background:#111;
    border-radius:10px;
    box-shadow:0 0 25px rgba(0,0,0,.9);
    padding:26px 26px 28px;
    max-width:960px;width:90%;
    line-height:1.35;font-size:14px;white-space:pre-wrap;overflow:hidden;
    transform:perspective(900px) rotateX(4deg);
  }
  #terminal.orange{background:#b7421c}
  /* scan‑lines */
  #terminal::after{
    content:"";
    position:absolute;inset:0;
    background: repeating-linear-gradient(0deg,rgba(0,0,0,.0) 0 2px,rgba(0,0,0,.12) 2px 4px);
    mix-blend-mode:overlay;pointer-events:none;
  }
  /* subtle flicker */
  @keyframes flicker{ 0%,100%{opacity:.98}50%{opacity:.94} }
  #terminal{animation:flicker 3s infinite steps(60);}
  /* radiation bloom fade after report */
  #radiation{
    position:absolute;inset:0;
    background:radial-gradient(circle at center,rgba(255,255,255,.25) 0%,rgba(255,255,255,0) 60%);
    opacity:0;pointer-events:none;
    transition:opacity 3s ease-out;
  }
  .cursor{display:inline-block;width:10px;background:#e6e6e6;margin-left:2px;animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
  <div id="terminal"><div id="radiation"></div></div>
<script>
/* ============ TEXT BLOCKS ============ */
const INTRO_LINES=[
  'Initiating Secure Comms: TRX-SEC',
  'Establishing encrypted channel ░░░░░',
  'Channel secure.',
  'Validating AUTH_SIG: nX*3kW>rAEFxm2%',
  '◢◤ [ AUTH_SIG: nX*3kW>rAEFxm2% ] ◢◤',
  '◢◤ [ ✔ Retrieval validated  |  TRX‑SEC SENTINEL SIGMA‑7 ] ◢◤',
  'Handshake complete.'
];
const REPORT_LINES=[
  ' █████████████████████████████████████ ',
  ' █████████████████████████████████████ ',
  '             ▄███████████▄             ',
  '           ▄████▀█████▀████▄           ',
  '         ▄████▀  █████  ▀████▄         ',
  ' ▄▄▄▄▄▄▄████▀    █████    ▀████▄▄▄▄▄▄  ',
  ' █████████▀      █████     ▀█████████  ',
  '                TRAXUS                ',
  '            WE BUILD WORLDSᴰ           ',
  '',
  '// ::TRAXUS SIGNAL OBSERVATORY NODE UX‑4409',
  '// ::PAYLOAD SEGMENT GAMMA‑77  —  FINALIZED',
  '// ::DECODING LATTICE BACKFLOW  <SYNC 97%>',
  '',
  '+HX8‑9ΔΞ::STYX‑T7‑HOLO→UE11::SA◆LMN‑Ω00••',
  '+99ZT‑B80==ADMP2!Z##11CCZ‑MN2##PL••',
  '+--PXE‑R0X//00211#TX1J‑9SXC=!!ENG██',
  '++ΛΞΣ/STACK::ORPHEUS_CORE||0x7A42B1||',
  '+==TRX//SIG‑SCAN//BNDRY::CORRUPTION_LEVEL:███████░░░░ 46%',
  '+--TRX‑AI ▸ PARSE_MODE = <UUE>  ▸ CRC STABLE',
  '',
  '// ::FIELD REPORT    >> AGENT VOID//.YETI',
  '// ::OPERATION ID    >> “ORPHEUS‑1138 / BLACKBIRD”',
  '// ::EXFIL VECTOR    >> REVENANT‑CLASS DROP (PHANTOM Δ‑BLACK)',
  '// ::MISSION STATUS  >>  ✓  OBJECTIVE SECURED',
  '',
  '>  ACTION SUMMARY',
  '   ▸ Pfhor Annex‑Θ breached via Vent AX‑17 (silent).',
  '   ▸ Physical Pod ORPHEUS_CORE extracted intact.',
  '   ▸ BLACKBIRD_CORE online — initial pulse 8.2 THz.',
  '   ▸ Drone lattice suppressed — zero outbound alarms.',
  '',
  '>  CAPITAL IMPACT (PROJ)',
  '   ▸ Ω‑tier proto‑AI valuation : ████ 13.8 B Cr',
  '   ▸ Trade surplus (Δ 24 mos)  : █████████ 227 %',
  '',
  '// ::FORWARD TO  >> TRX‑SEC — “HELIOS FRAME”',
  '// ::AUTH LEVEL  >> 5‑C (Pre‑cleared)',
  '// ::ETA        >> 03:14:22 and falling…',
  '',
  '◢◤ [ AUTH_SIG: nX*3kW>rAEFxm2% ] ◢◤',
  '◢◤ [ ✔ Retrieval validated  |  TRX‑SEC SENTINEL SIGMA‑7 ] ◢◤'
];
/* ============ TERMINAL & CURSOR ============ */
const term  = document.getElementById('terminal');
const rad   = document.getElementById('radiation');
const cur   = document.createElement('span');
cur.className='cursor';
cur.textContent=' ';
term.appendChild(cur);

/* ============ TYPEWRITER ENGINE ============ */
let phase='intro';
let lines=INTRO_LINES;
let lineIdx=0, charIdx=0;
const SPEED={intro:25, report:8};
const STRIDE={intro:1,  report:1};

function next(){
  const speed = SPEED[phase];
  const stride= STRIDE[phase];

  if(lineIdx>=lines.length){
    if(phase==='intro'){
      setTimeout(()=>{
        phase='report';
        lines=REPORT_LINES;
        term.classList.add('orange');
        term.innerHTML='';
        term.appendChild(cur);
        lineIdx=charIdx=0;
        next();
      },3000);
    }else{
      cur.remove();
      // radiation bloom fade
      rad.style.opacity='1';
    }
    return;
  }

  if(charIdx===0){
    const div=document.createElement('div');
    term.insertBefore(div,cur);
  }
  const line=lines[lineIdx];
  for(let i=0;i<stride && charIdx<line.length;i++){
    term.children[lineIdx].textContent += line.charAt(charIdx++);
  }
  if(charIdx>=line.length){
    charIdx=0; lineIdx++;
  }
  setTimeout(next,speed);
}
next();
</script>
</body>
</html>
