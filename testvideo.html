<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video‑only test</title>
<style>
html,body{height:100%;margin:0;background:#000;display:flex;align-items:center;justify-content:center}
video{width:960px;height:540px;object-fit:cover;border-radius:10px;box-shadow:0 0 25px rgba(0,0,0,.9)}
</style>
</head>
<body>

<video id="testVid"
       src="marathon-marathon-game.mp4"
       muted autoplay loop playsinline preload="auto"></video>

<script>
const v=document.getElementById('testVid');
v.addEventListener('canplay',()=>console.log('✅ canplay fired – video ready'));
v.addEventListener('error',e   =>console.log('❌ video error',e));
</script>

</body>
</html>
